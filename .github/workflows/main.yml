name: CI devops 2025
on:
  push:
    branches: 
      - main
      - develop
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and test with Maven
        run: mvn clean verify --file ./simple-api/pom.xml

  sonarcloud:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Analyze with SonarCloud
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=SimonGIR_tp2-docker -Dsonar.organization=simongir -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file ./simple-api/pom.xml

  build-and-push-backend:
    needs: sonarcloud
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:v1.0.${{ github.run_number }}-sha-${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: true

  build-and-push-database:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./Database
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:v1.0.${{ github.run_number }}-sha-${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

  build-and-push-httpd:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./HTTP-server
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-http-server:v1.0.${{ github.run_number }}-sha-${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-http-server:latest
          push: true

  deploy:
  name: Deploy
  runs-on: ubuntu-24.04
  needs:
    - build-and-push-backend
    - build-and-push-database
    - build-and-push-httpd
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install Ansible
      run: |
        sudo apt update
        sudo apt install -y ansible
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
    - name: Add server to known_hosts
      run: |
        ssh-keyscan -H simon.girard.20240687.takima.school >> ~/.ssh/known_hosts
    - name: Test SSH connection
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no admin@simon.girard.20240687.takima.school "echo OK"
    - name: Deploy with Ansible
      run: |
        cd ansible
        ansible-playbook -i inventories/setup.yml playbook.yml